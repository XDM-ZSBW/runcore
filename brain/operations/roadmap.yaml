# brain/operations/roadmap.yaml
# Instance roadmap — phases, streams, and milestones.
# Parsed by /api/roadmap and rendered by roadmap.html.

phases:
  - id: foundation
    label: "Foundation"
    start: "2026-Q1"
    end: "2026-Q1"
  - id: distribution
    label: "Distribution"
    start: "2026-Q2"
    end: "2026-Q2"
  - id: capabilities
    label: "Capabilities"
    start: "2026-Q2"
    end: "2026-Q3"
  - id: ecosystem
    label: "Ecosystem"
    start: "2026-Q3"
    end: "2026-Q4"

streams:
  - id: core
    name: Core
    color: "#3b82f6"
    description: "Generic distributable runtime"

  - id: plugins
    name: Capability Plugins
    color: "#a78bfa"
    description: "External tools integrated as Core skills"

milestones:
  - id: core-brain-runtime
    stream: core
    title: "Brain TS runtime"
    phase: foundation
    status: done

  - id: core-mcp-server
    stream: core
    title: "MCP server (stdio)"
    phase: foundation
    status: done

  - id: core-http-server
    stream: core
    title: "HTTP server + UI"
    phase: foundation
    status: done

  - id: core-nav-parity
    stream: core
    title: "Nav parity with Dash"
    phase: foundation
    status: in_progress
    depends_on: [core-http-server]

  - id: core-mesh-discovery
    stream: core
    title: "mDNS mesh discovery"
    phase: distribution
    status: planned
    depends_on: [core-http-server]

  - id: core-spawn-template
    stream: core
    title: "Instance spawn from template"
    phase: distribution
    status: planned
    depends_on: [core-nav-parity]

  - id: plugin-browser
    stream: plugins
    title: "Browser sidecar"
    phase: capabilities
    status: done

  - id: plugin-search
    stream: plugins
    title: "Search integration"
    phase: capabilities
    status: planned
