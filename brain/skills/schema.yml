# =============================================================================
# Skill File Schema for Core Agent Skills
# =============================================================================
#
# Defines the structure every `.yml` file in `brain/skills/` must follow.
# Validated at runtime by `src/brain/skills.ts` (parseSkillYaml + validateSkill).
#
# Purpose:
#   Skills are declarative capability descriptors. They tell the agent what tools
#   are available, when to activate, and how a user might invoke the capability.
#   Skills don't contain implementation — they're metadata for routing and
#   context-loading decisions.
#
# File format:
#   Flat YAML — no nested objects. Supports scalars, folded scalars (>), and
#   arrays (- items). Parsed by a custom lightweight parser, not a full YAML
#   spec parser.
#
# Naming convention:
#   Filename must match the `name` field: `{name}.yml` (e.g., `git-operations.yml`).
#
# Example complete skill file:
#
#   name: code-review
#   description: >
#     Reviews code changes for quality, correctness, and adherence to project
#     conventions. Use when a PR needs review, code was just written, or the
#     user asks for feedback on implementation quality.
#   tools:
#     - read
#     - grep
#     - git
#   context_patterns:
#     - "*.ts"
#     - "*.js"
#     - "pull request"
#     - "review"
#     - "diff"
#   example_prompt: >
#     Review the changes in the current branch and flag any issues with error
#     handling, naming conventions, or missing edge cases.
#   version: "1.0"
#   tags:
#     - quality
#     - collaboration
#   depends_on:
#     - file-editing
#     - git-operations
#   notes: >
#     Always read the full diff before commenting. Focus on logic errors and
#     security issues over style nitpicks.
#
# =============================================================================

_schema:
  version: "1.0"
  description: "Schema for Core agent skill files"

# =============================================================================
# REQUIRED FIELDS
# =============================================================================
# All five fields below must be present in every skill file. Validation fails
# if any are missing or empty.
# =============================================================================

required_fields:

  # ---------------------------------------------------------------------------
  # name: string
  # ---------------------------------------------------------------------------
  # Unique identifier for this skill. Used for lookups, dependency references
  # (depends_on), and filename matching.
  #
  # Constraints:
  #   - Must be kebab-case: lowercase letters, digits, and hyphens only
  #   - Must start with a letter (not a digit or hyphen)
  #   - Regex: ^[a-z][a-z0-9-]*$
  #
  # Examples:
  #   name: git-operations       # good
  #   name: file-editing         # good
  #   name: web-scraping         # good
  #   name: 2fa-setup            # BAD — starts with a digit
  #   name: Git-Operations       # BAD — uppercase letters
  #   name: file editing         # BAD — contains a space
  # ---------------------------------------------------------------------------
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
    description: "Unique skill identifier (kebab-case, e.g., 'file-editing')"

  # ---------------------------------------------------------------------------
  # description: string
  # ---------------------------------------------------------------------------
  # Explains what this skill does, when it should be activated, and why an
  # agent would choose it. Used for intent matching and skill discovery.
  #
  # Best practices:
  #   - Start with a verb phrase: "Reviews...", "Manages...", "Handles..."
  #   - Include keywords that map to user intent
  #   - Mention the problem domain, not just the tools
  #   - Use folded scalar (>) for multi-line descriptions
  #   - Minimum length: 10 characters
  #
  # Examples:
  #   description: >
  #     Git version control operations: committing changes, branch management,
  #     viewing history, resolving conflicts, and maintaining clean commit
  #     hygiene. Use when a task involves source control.
  #
  #   description: "Runs and debugs test suites for TypeScript projects."
  # ---------------------------------------------------------------------------
  description:
    type: string
    min_length: 10
    description: "What this skill does — when and why an agent should use it"

  # ---------------------------------------------------------------------------
  # tools: array of strings
  # ---------------------------------------------------------------------------
  # The tools or commands this skill relies on. Maps to available agent tools
  # (read, edit, write, glob, grep, git, npm, etc.) or external CLIs.
  #
  # Used to verify the agent has the required capabilities before activating
  # the skill.
  #
  # Constraints:
  #   - Must have at least one item
  #   - Each item must be a string
  #
  # Examples:
  #   tools:
  #     - git
  #     - gh
  #
  #   tools:
  #     - read
  #     - edit
  #     - write
  #     - glob
  #     - grep
  # ---------------------------------------------------------------------------
  tools:
    type: array
    items: string
    min_items: 1
    description: "List of tools or commands this skill uses (e.g., git, npm, read, edit)"

  # ---------------------------------------------------------------------------
  # context_patterns: array of strings
  # ---------------------------------------------------------------------------
  # File paths, glob patterns, directory names, or keywords that signal when
  # this skill is relevant. The agent uses these for automatic skill matching:
  # if the user's prompt or the working context matches any pattern, this skill
  # may be auto-loaded.
  #
  # Pattern types:
  #   - File extensions:  "*.ts", "*.yml", "*.json"
  #   - Directory names:  "src/", ".git/", "brain/memory/"
  #   - Specific files:   "package.json", "tsconfig.json"
  #   - Keywords:         "commit", "refactor", "deploy", "test"
  #
  # Constraints:
  #   - Must have at least one item
  #   - Each item must be a string
  #
  # Examples:
  #   context_patterns:
  #     - ".git/"
  #     - "commit"
  #     - "branch"
  #     - "pull request"
  #
  #   context_patterns:
  #     - "*.test.ts"
  #     - "*.spec.ts"
  #     - "__tests__/"
  #     - "vitest"
  #     - "jest"
  # ---------------------------------------------------------------------------
  context_patterns:
    type: array
    items: string
    min_items: 1
    description: "File paths, extensions, directory names, or keywords that indicate when this skill is relevant"

  # ---------------------------------------------------------------------------
  # example_prompt: string
  # ---------------------------------------------------------------------------
  # A realistic example of how a user might invoke this skill. Serves as both
  # documentation and a test case for intent matching.
  #
  # Best practices:
  #   - Write it as a real user request, not a description
  #   - Include specifics (file names, actions) to show the skill in context
  #   - Use folded scalar (>) for multi-line prompts
  #   - Minimum length: 10 characters
  #
  # Examples:
  #   example_prompt: >
  #     Commit the current changes with a descriptive message, then push to
  #     the remote branch. If there are unstaged files, review them first.
  #
  #   example_prompt: >
  #     Run the test suite and fix any failing tests. Focus on the auth
  #     module — I changed the token validation logic.
  # ---------------------------------------------------------------------------
  example_prompt:
    type: string
    min_length: 10
    description: "A realistic example prompt showing how to invoke this skill"

# =============================================================================
# OPTIONAL FIELDS
# =============================================================================
# These fields provide additional metadata. Omit them if not needed — the
# validator will not flag their absence.
# =============================================================================

optional_fields:

  # ---------------------------------------------------------------------------
  # version: string
  # ---------------------------------------------------------------------------
  # Schema version this skill conforms to. Defaults to "1.0" if omitted.
  # Allows future schema evolution without breaking existing skill files.
  #
  # Example:
  #   version: "1.0"
  # ---------------------------------------------------------------------------
  version:
    type: string
    description: "Skill schema version (defaults to '1.0')"

  # ---------------------------------------------------------------------------
  # tags: array of strings
  # ---------------------------------------------------------------------------
  # Categorization labels for discovery and filtering. Unlike context_patterns,
  # tags are for organizational grouping, not activation matching.
  #
  # Examples:
  #   tags:
  #     - version-control
  #     - workflow
  #     - collaboration
  #
  #   tags:
  #     - code
  #     - quality
  # ---------------------------------------------------------------------------
  tags:
    type: array
    items: string
    description: "Categorization tags for discovery and filtering"

  # ---------------------------------------------------------------------------
  # depends_on: array of strings
  # ---------------------------------------------------------------------------
  # Names of other skills this one requires. When this skill is activated,
  # its dependencies should also be loaded. Values must match valid skill
  # names (kebab-case identifiers).
  #
  # Example:
  #   depends_on:
  #     - file-editing
  #     - git-operations
  # ---------------------------------------------------------------------------
  depends_on:
    type: array
    items: string
    description: "Other skill names this skill requires"

  # ---------------------------------------------------------------------------
  # notes: string
  # ---------------------------------------------------------------------------
  # Free-form additional context, caveats, or best-practice reminders for
  # the agent when using this skill. Not used for matching — purely advisory.
  #
  # Example:
  #   notes: >
  #     Always read a file before editing it. Prefer Edit over Write for
  #     existing files. Use Glob for file discovery, not shell find.
  # ---------------------------------------------------------------------------
  notes:
    type: string
    description: "Additional context or caveats for the skill"
