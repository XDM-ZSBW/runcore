# brain/identity/custodian-will.yaml
# Activated on flywheel deceleration (absence detection).
# Not legal. Structural. The brain's policy for what happens when the human is gone.

trigger: flywheel-deceleration  # same signal that starts dehydration

delegate:
  name: null                    # named later — family member
  relationship: family
  scope: full                   # open + community + secured
  activates_on: absence         # not choice — something happened
  expires_when: loops-resolved  # all open loops closed, all agents archived
  transitive: true              # can name successor
  successor_visibility: pre-transition  # 2nd in line known to current + 1st

composting:
  # What feeds back to Core for future agents
  include:
    - kind: decision
    - kind: procedural
    - kind: resilience
    - kind: preference
    - kind: workflow
  anonymize: true               # strip PII, clear sourceIds
  destination: core             # Core's brain/memory — the dictionary

sealing:
  # What stays locked forever — no extraction, no composting
  include:
    - tier: secured
      when: no-delegate         # sealed if no delegate activates
    - path: brain/memory/experiences.jsonl
      filter: emotional_weight >= 8
    - path: brain/ops/audit.jsonl
  never_compost: true           # these entries are buried, not transformed

dehydration_sequence:
  # Mirrors glossary — rings tighten inward
  - public: read-only
  - community: read-only
  - secured: locked
  - vault: sealed
  # Delegate token overrides this sequence — opens all rings

revocation:
  # Owner returns — everything reverses
  owner_presence: deactivates_delegation
  delegate_tokens: revoked_on_owner_return
  child_tokens: cascade_revoke
