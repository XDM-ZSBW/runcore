# Vault Policy — Bryant's vault
# Classifies brain paths into access tiers.
# Wendy (administration) generates these. Marvin (loss prevention) enforces.
# Core provides the machinery.
#
# Tiers:
#   open      — porch to front door. Anyone through the vault door sees this.
#   community — inside the house. Trusted people with the front door key.
#   secured   — safe in the office. Only the vault owner's keyholder agent.
#
# TODO: Temporal rules (business hours access), vault nesting, resolution depth.

owner: Bryant

tiers:
  open:
    - knowledge/research/**
    - content/published/**
    - identity/brand.md

  community:
    - operations/**
    - calendar/**
    - content/drafts/**
    - knowledge/notes/**
    - identity/principles.md
    - identity/tone-of-voice.md
    - identity/instances.yaml

  secured:
    - memory/experiences.jsonl
    - vault/**
    - identity/human.json
    - ops/audit.jsonl

# Unclassified paths default to: community
default_tier: community
