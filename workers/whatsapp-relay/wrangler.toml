name = "dash-whatsapp-relay"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   TWILIO_AUTH_TOKEN  — Twilio auth token for webhook signature verification
#   RELAY_SECRET       — Shared HMAC secret between this Worker and the Dash server
#   DASH_SERVER_URL    — Full origin of the Dash server (e.g. https://dash.example.com)

# Optional: custom domain or route
# routes = [{ pattern = "whatsapp.example.com/api/twilio/*", zone_name = "example.com" }]

[observability]
enabled = true
