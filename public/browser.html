<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{INSTANCE_NAME}} — Browser</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e33;
    --text: #e4e4e7;
    --text-dim: #8b8b94;
    --accent: #6d5dfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
    --blue: #3b82f6;
    --purple: #a78bfa;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Header --- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
  }

  header h1 a {
    color: var(--text);
    text-decoration: none;
  }

  header h1 a:hover { opacity: 0.8; }

  .header-nav {
    display: flex;
    gap: 4px;
    margin-left: 20px;
  }

  .header-nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .header-nav a:hover { color: var(--text); border-color: var(--accent); background: rgba(109,93,252,0.1); }
  .header-nav a.active { color: var(--text); border-color: var(--border); background: var(--surface2); }

  /* --- URL bar --- */
  .url-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .url-bar label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .url-input:focus { border-color: var(--accent); }

  .fetch-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .fetch-btn:hover { opacity: 0.9; }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 14px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .nav-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(109,93,252,0.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); background: none; }

  /* --- Meta bar --- */
  .meta-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    min-height: 36px;
  }

  .meta-bar .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-bar .meta-label {
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-weight: 600;
  }

  .meta-bar .meta-value {
    color: var(--text);
  }

  .meta-bar .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.truncated { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.loading { background: rgba(109,93,252,0.15); color: var(--accent); }

  /* --- View tabs --- */
  .view-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .view-tab {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .view-tab:hover { color: var(--text); }
  .view-tab.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

  .view-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-right: 8px;
  }

  /* --- Content area --- */
  .content-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .page-frame-wrap {
    flex: 1;
    display: none;
    position: relative;
  }

  .page-frame-wrap.visible { display: flex; }

  .page-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
  }

  .frame-blocked {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 8px;
    padding: 40px;
    text-align: center;
  }

  .frame-blocked .icon { font-size: 32px; opacity: 0.5; }
  .frame-blocked p { font-size: 13px; }
  .frame-blocked a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .frame-blocked a:hover { text-decoration: underline; }

  .content-split { border-left: 1px solid var(--border); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 8px;
  }

  .empty-state .icon { font-size: 48px; opacity: 0.5; }
  .empty-state p { font-size: 14px; }
  .empty-state .hint { font-size: 12px; color: var(--text-dim); }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .page-text {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .error-display {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    padding: 20px;
    color: var(--red);
    font-size: 14px;
    text-align: center;
  }

  .llms-txt {
    margin-top: 16px;
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 8px;
    overflow: hidden;
  }

  .llms-txt-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(34,197,94,0.08);
    border-bottom: 1px solid rgba(34,197,94,0.2);
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .llms-txt-body {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    background: var(--surface);
    padding: 16px 20px;
  }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <h1><a href="/">{{INSTANCE_NAME}}</a></h1>
    <nav class="header-nav">
      <a href="/">Chat</a>
      <a href="/library">Library</a>
      <a href="/personal">Personal</a>
      <a href="/life">Life</a>
      <a href="/registry">Registry</a>
      <span class="nav-divider"></span>
      <a href="/observatory">Observatory</a>
      <a href="/ops">Operations</a>
      <a href="/board">Board</a>
      <a href="/roadmap">Roadmap</a>
    </nav>
  </div>
  <div class="header-actions-right">
    <button class="gear-btn" onclick="openShareModal()" title="Share Core">&#9993;</button>
    <a class="gear-btn" href="/?settings=open" title="Settings">&#9881;</a>
  </div>
</header>

<div class="url-bar">
  <button class="nav-btn" id="backBtn" onclick="goBack()" disabled title="Back">&#9664;</button>
  <button class="nav-btn" id="fwdBtn" onclick="goForward()" disabled title="Forward">&#9654;</button>
  <button class="nav-btn" id="refreshBtn" onclick="refresh()" disabled title="Refresh">&#8635;</button>
  <input type="text" class="url-input" id="urlInput" placeholder="https://example.com" spellcheck="false" />
  <button class="fetch-btn" id="fetchBtn" onclick="fetchUrl()">Fetch</button>
</div>

<div class="meta-bar" id="metaBar">
  <span style="color:var(--text-dim);">Enter a URL to see how {{INSTANCE_NAME}} reads it</span>
</div>

<div class="view-tabs" id="viewTabs" style="display:none;">
  <span class="view-label">View</span>
  <button class="view-tab active" data-view="split" onclick="setView('split')">Split</button>
  <button class="view-tab" data-view="page" onclick="setView('page')">Page</button>
  <button class="view-tab" data-view="text" onclick="setView('text')">{{INSTANCE_NAME}} Text</button>
</div>

<div class="content-wrap" id="contentWrap">
  <div class="page-frame-wrap" id="pageFrameWrap">
    <iframe class="page-frame" id="pageFrame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
  </div>
  <div class="content content-split" id="content">
    <div class="empty-state">
      <div class="icon">👁️</div>
      <p>{{INSTANCE_NAME}}'s view of the web</p>
      <p class="hint">Paste a URL and hit Fetch to see the extracted text {{INSTANCE_NAME}} works with</p>
    </div>
  </div>
</div>

<script>
var sessionId = sessionStorage.getItem("dash_sid");
function authHeaders() { return sessionId ? { "x-session-id": sessionId } : {}; }
fetch('/api/tier', { headers: authHeaders() }).then(r=>{ if(r.status===401){location.href='/';return null;} return r.json(); }).then(d=>{if(d&&(!d.capabilities||!d.capabilities.vault))location.href='/'}).catch(()=>{});
const urlInput = document.getElementById('urlInput');
const fetchBtn = document.getElementById('fetchBtn');
const metaBar = document.getElementById('metaBar');
const content = document.getElementById('content');
const viewTabs = document.getElementById('viewTabs');
const pageFrameWrap = document.getElementById('pageFrameWrap');
const pageFrame = document.getElementById('pageFrame');
const backBtn = document.getElementById('backBtn');
const fwdBtn = document.getElementById('fwdBtn');
const refreshBtn = document.getElementById('refreshBtn');

let currentView = 'split';
let currentUrl = '';
let history = [];
let historyIndex = -1;

function updateNavButtons() {
  backBtn.disabled = historyIndex <= 0;
  fwdBtn.disabled = historyIndex >= history.length - 1;
  refreshBtn.disabled = !currentUrl;
}

function pushHistory(url) {
  // Trim forward history when navigating from a back state
  if (historyIndex < history.length - 1) {
    history = history.slice(0, historyIndex + 1);
  }
  history.push(url);
  historyIndex = history.length - 1;
  updateNavButtons();
}

function goBack() {
  if (historyIndex <= 0) return;
  historyIndex--;
  navigateTo(history[historyIndex], false);
}

function goForward() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  navigateTo(history[historyIndex], false);
}

function refresh() {
  if (currentUrl) navigateTo(currentUrl, false);
}

function navigateTo(url, addToHistory = true) {
  urlInput.value = url;
  currentUrl = url;
  if (addToHistory) pushHistory(url);
  else updateNavButtons();

  fetchBtn.disabled = true;
  fetchBtn.textContent = 'Fetching...';
  metaBar.innerHTML = '<span class="badge loading">loading</span> <span>Fetching and processing...</span>';
  content.innerHTML = '';

  viewTabs.style.display = '';
  setView(currentView);
  try {
    const parsed = new URL(url);
    if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
      pageFrame.src = parsed.href;
    } else {
      pageFrame.src = 'about:blank';
    }
  } catch {
    pageFrame.src = 'about:blank';
  }

  fetch('/api/browse?url=' + encodeURIComponent(url), { headers: authHeaders() })
    .then(r => { if (r.status === 401) { window.location.href = '/'; return null; } return r.json(); })
    .then(data => {
      if (!data) return;
      if (data.error) {
        metaBar.innerHTML = `<span class="badge error">error</span> <span>${escapeHtml(data.error)}</span>`;
        content.innerHTML = `<div class="error-display">${escapeHtml(data.error)}</div>`;
        return;
      }
      renderResult(data);
    })
    .catch(err => {
      metaBar.innerHTML = `<span class="badge error">error</span> <span>Network error: ${escapeHtml(err.message)}</span>`;
      content.innerHTML = `<div class="error-display">Failed to reach {{INSTANCE_NAME}} server</div>`;
    })
    .finally(() => {
      fetchBtn.disabled = false;
      fetchBtn.textContent = 'Fetch';
    });
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));

  if (view === 'page') {
    pageFrameWrap.classList.add('visible');
    content.style.display = 'none';
  } else if (view === 'text') {
    pageFrameWrap.classList.remove('visible');
    content.style.display = '';
    content.classList.remove('content-split');
  } else {
    // split
    pageFrameWrap.classList.add('visible');
    content.style.display = '';
    content.classList.add('content-split');
  }
}

function renderResult(data) {
  const chars = data.text ? data.text.length : 0;
  const statusBadge = data.truncated
    ? '<span class="badge truncated">truncated</span>'
    : '<span class="badge ok">complete</span>';
  const llmsBadge = data.llmsTxt
    ? '<span class="badge ok">llms.txt</span>'
    : '';

  metaBar.innerHTML = `
    ${statusBadge}
    ${llmsBadge}
    <span class="meta-item"><span class="meta-label">Title:</span> <span class="meta-value">${escapeHtml(data.title || '(none)')}</span></span>
    <span class="meta-item"><span class="meta-label">Chars:</span> <span class="meta-value">${chars.toLocaleString()}</span></span>
    <span class="meta-item"><span class="meta-label">URL:</span> <span class="meta-value">${escapeHtml(data.url)}</span></span>
  `;

  let html = '';
  if (data.title) {
    html += `<div class="page-title">${escapeHtml(data.title)}</div>`;
  }
  if (data.llmsTxt) {
    html += `<div class="llms-txt">
      <div class="llms-txt-header">llms.txt found</div>
      <div class="llms-txt-body">${escapeHtml(data.llmsTxt)}</div>
    </div>`;
  }
  html += `<div class="page-text" style="margin-top:${data.llmsTxt ? '16px' : '0'}">${escapeHtml(data.text || '(empty page)')}</div>`;
  content.innerHTML = html;
}

function fetchUrl() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  navigateTo(url, true);
}

// Handle iframe load errors (X-Frame-Options / CSP blocking)
pageFrame.addEventListener('load', () => {
  try {
    // If we can access contentDocument, it loaded fine
    const doc = pageFrame.contentDocument;
    if (doc && doc.body && doc.body.innerHTML === '') {
      showFrameBlocked();
    }
  } catch {
    // Cross-origin — frame loaded but we can't inspect it (that's fine, it's showing)
  }
});

function showFrameBlocked() {
  if (!currentUrl) return;
  const overlay = document.createElement('div');
  overlay.className = 'frame-blocked';
  overlay.innerHTML = `
    <div class="icon">🔒</div>
    <p>This site blocks iframe embedding</p>
    <a href="${escapeHtml(currentUrl)}" target="_blank" rel="noopener">Open in new tab</a>
  `;
  pageFrameWrap.appendChild(overlay);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Enter key triggers fetch
urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') fetchUrl();
});

// Auto-focus URL input
urlInput.focus();

// Handle URL parameter (e.g. /browser?url=https://example.com)
const params = new URLSearchParams(location.search);
const initUrl = params.get('url');
if (initUrl) {
  const normalized = /^https?:\/\//i.test(initUrl) ? initUrl : 'https://' + initUrl;
  navigateTo(normalized, true);
}
</script>
<script src="/public/share-modal.js"></script>
</body>
</html>
