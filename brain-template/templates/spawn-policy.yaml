# Spawn Policy — governs what the chief-of-staff agent can create
# Ships with every new chief-of-staff instance at onboarding.
# The owner can modify. Loss prevention audits.

owner: "{{OWNER}}"
governed_by: "{{CHIEF_OF_STAFF}}"

# Maximum concurrent agents this chief-of-staff can spawn
max_agents: 4

# Allowed agent types and their limits
# modes: comma-separated list of allowed modes (read-only, write, react). Empty = all.
# budget_cap: max ReAct iterations per agent (default 10, 0 = unlimited)
allowed_types:
  administration:
    max: 1
    auto_spawn: false
    modes: read-only, react
    budget_cap: 10
  brand:
    max: 1
    auto_spawn: false
    modes: read-only
    budget_cap: 10
  commercial:
    max: 2
    auto_spawn: false
    modes: read-only, react
    budget_cap: 15
  loss-prevention:
    max: 1
    auto_spawn: false
    modes: read-only
    budget_cap: 10

# Chief-of-staff cannot spawn another chief-of-staff
deny_types:
  - chief-of-staff

# Spawn requires owner approval by default for write/react modes.
# Read-only agents always allowed. Set to false once trust is established.
require_owner_approval: true
