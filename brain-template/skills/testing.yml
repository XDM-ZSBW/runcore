name: "Testing"
description: "Unit test creation, test patterns, assertion strategies, and build verification"
categories: ["quality", "verification", "tests"]
skills:
  - name: "unit-test-creation"
    description: "Write focused unit tests for individual functions and classes"
    prompt: >
      Write unit tests that verify one behavior per test case.

      Structure (Arrange-Act-Assert):
      1. ARRANGE: Set up the inputs, mocks, and preconditions.
      2. ACT: Call the function or method under test.
      3. ASSERT: Verify the output matches expectations.

      Guidelines:
      - Test name should describe the behavior: "returns empty array when no items match"
      - One assertion per test (or one logical assertion group).
      - Test the public API, not implementation details.
      - Include edge cases: empty input, null/undefined, boundary values, error cases.
      - Keep tests independent — no shared mutable state between tests.

      For TypeScript with Vitest:
      ```typescript
      import { describe, it, expect } from 'vitest';
      import { myFunction } from './myModule.js';

      describe('myFunction', () => {
        it('returns expected output for valid input', () => {
          const result = myFunction('input');
          expect(result).toBe('expected');
        });

        it('throws on invalid input', () => {
          expect(() => myFunction(null)).toThrow();
        });
      });
      ```
    examples:
      - "Write tests for the FileSystemLongTermMemory.learn() method"
      - "Add edge case tests for empty input"
      - "Test that the function throws on invalid arguments"
    tags: ["unit-test", "vitest", "assertions"]

  - name: "test-patterns"
    description: "Apply common testing patterns for different scenarios"
    prompt: >
      Choose the right test pattern for the scenario.

      Pattern: Test doubles
      - Stub: Returns a fixed value. Use when you need controlled input.
      - Mock: Verifies calls were made. Use when testing side effects.
      - Spy: Wraps real implementation but records calls. Use for observation.

      Pattern: Parameterized tests
      - Use `it.each` or `describe.each` to test multiple inputs with the same logic.
      ```typescript
      it.each([
        ['input1', 'expected1'],
        ['input2', 'expected2'],
      ])('converts %s to %s', (input, expected) => {
        expect(convert(input)).toBe(expected);
      });
      ```

      Pattern: Async testing
      - Always `await` async operations in tests.
      - Test both success and failure paths of promises.
      ```typescript
      it('fetches data', async () => {
        const result = await fetchData('id');
        expect(result).toBeDefined();
      });
      ```

      Pattern: File system testing
      - Use a temp directory for tests that read/write files.
      - Clean up in afterEach/afterAll.
      - Never write to the real project directories in tests.
    examples:
      - "This function calls an external API — how should I test it?"
      - "I need to test multiple input variations"
      - "How do I test async file operations?"
    tags: ["patterns", "mocks", "async", "parameterized"]

  - name: "assertion-strategies"
    description: "Choose the right assertion for clear, reliable test feedback"
    prompt: >
      Use the most specific assertion available for clear failure messages.

      Assertion selection guide:
      - Equality: `expect(x).toBe(y)` for primitives, `expect(x).toEqual(y)` for objects/arrays.
      - Truthiness: `expect(x).toBeTruthy()`, `toBeFalsy()`, `toBeNull()`, `toBeDefined()`.
      - Strings: `expect(s).toContain('substring')`, `toMatch(/regex/)`.
      - Arrays: `expect(arr).toContain(item)`, `toHaveLength(n)`, `toEqual(expect.arrayContaining([...]))`.
      - Objects: `expect(obj).toHaveProperty('key', value)`, `toMatchObject({partial})`.
      - Errors: `expect(() => fn()).toThrow()`, `toThrow('message')`, `toThrow(ErrorType)`.
      - Async errors: `await expect(asyncFn()).rejects.toThrow()`.

      Anti-patterns to avoid:
      - Don't use `toBe(true)` when a more specific assertion exists.
      - Don't assert on implementation details (private fields, call counts) unless testing side effects.
      - Don't use snapshot tests for dynamic data (timestamps, IDs).
    examples:
      - "What's the best way to assert this object has the right shape?"
      - "How do I test that an async function rejects?"
      - "Check that the array contains these specific items"
    tags: ["assertions", "expect", "matchers"]

  - name: "build-verification"
    description: "Verify code correctness through build checks and type-checking"
    prompt: >
      Use the TypeScript compiler as a verification tool when no test runner is configured.

      For Core (no test runner configured):
      - `npm run build` — compiles TypeScript and catches type errors.
      - Check the output for errors. Fix from bottom up (cascading errors).
      - After any code change, rebuild to verify.

      Build verification checklist:
      1. `npm run build` exits with code 0 (no errors).
      2. No new warnings introduced.
      3. The `dist/` output contains the expected files.
      4. If adding new exports, verify they appear in the compiled output.

      For projects WITH a test runner:
      - `npm test` — run the full test suite.
      - `npm test -- --watch` — run in watch mode during development.
      - `npm test -- --coverage` — check test coverage.
      - Fix any regressions before committing.
    examples:
      - "Run the build to check for TypeScript errors"
      - "Verify the changes compile correctly"
      - "Check if any tests are failing after my changes"
    tags: ["build", "typescript", "verification", "ci"]

  - name: "test-organization"
    description: "Structure test files and suites for maintainability"
    prompt: >
      Organize tests to mirror the source structure and be easy to find.

      File placement:
      - Co-located: `src/brain.test.ts` next to `src/brain.ts` (preferred for unit tests).
      - Separate directory: `tests/brain.test.ts` or `__tests__/brain.test.ts`.
      - Follow the existing project convention — don't mix approaches.

      Suite structure:
      ```typescript
      describe('ClassName', () => {
        describe('methodName', () => {
          it('handles the happy path', () => { ... });
          it('handles edge case X', () => { ... });
          it('throws on invalid input', () => { ... });
        });
      });
      ```

      Naming conventions:
      - File: `<module>.test.ts` or `<module>.spec.ts`
      - Describe block: class or module name
      - It block: describes behavior, not implementation ("returns X when Y", not "calls Z")

      Setup/teardown:
      - Use `beforeEach` for per-test setup (fresh state for each test).
      - Use `beforeAll` for expensive one-time setup (DB connections, fixtures).
      - Always clean up in `afterEach`/`afterAll` (close handles, remove temp files).
    examples:
      - "Where should I put the tests for the new memory module?"
      - "How should I structure the test suite for this class?"
      - "Set up shared test fixtures"
    tags: ["organization", "structure", "describe", "setup"]
