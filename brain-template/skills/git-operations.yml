name: "Git Operations"
description: "Git version control commands, branch management, commit strategies, and collaboration workflows"
categories: ["version-control", "workflow", "collaboration"]
skills:
  - name: "commit-with-intent"
    description: "Create focused commits grouped by logical purpose"
    prompt: >
      Stage and commit changes grouped by purpose. Each commit should represent one
      logical unit of work — a bug fix, a feature addition, a refactor, or a config
      change. Never mix unrelated changes in a single commit.

      Steps:
      1. Run `git status` and `git diff` to understand all pending changes.
      2. Group related files by purpose (e.g., all files for one bug fix together).
      3. Stage each group with `git add <specific-files>` — avoid `git add .` or `-A`.
      4. Write a commit message: imperative mood, under 72 chars for subject line.
      5. If a pre-commit hook fails, fix the issue and create a NEW commit (never amend).
    examples:
      - "Commit the auth changes separately from the UI tweaks"
      - "Stage only the files related to the rate limiter fix and commit"
      - "Break these changes into logical commits"
    tags: ["commit", "staging", "hygiene"]

  - name: "branch-management"
    description: "Create, switch, merge, and delete branches following best practices"
    prompt: >
      Manage git branches for feature isolation and clean history.

      Creating: `git checkout -b feature/descriptive-name` from an up-to-date base branch.
      Switching: `git checkout <branch>` — stash or commit work-in-progress first.
      Merging: Prefer merge commits for feature branches (`git merge --no-ff`).
      Deleting: Only delete merged branches. Use `git branch -d` (safe delete) not `-D`.

      Naming conventions:
      - feature/<name> for new features
      - fix/<name> for bug fixes
      - chore/<name> for maintenance
    examples:
      - "Create a feature branch for the new dashboard"
      - "Merge the fix branch back into main"
      - "Clean up stale branches that have been merged"
    tags: ["branch", "merge", "workflow"]

  - name: "history-inspection"
    description: "View and analyze git history, diffs, and blame information"
    prompt: >
      Use git log, diff, and blame to understand code evolution.

      Useful commands:
      - `git log --oneline -20` — recent history at a glance
      - `git log --oneline --graph --all` — branch topology
      - `git log -p -- <file>` — full patch history for one file
      - `git diff <branch>...HEAD` — changes since diverging from branch
      - `git blame <file>` — who changed each line and when
      - `git show <commit>` — inspect a specific commit's changes

      When investigating: start broad (log), narrow to file (log -p -- file),
      then zoom in (blame, show).
    examples:
      - "Show me what changed in the last 10 commits"
      - "Who last modified the auth middleware?"
      - "What's the diff between this branch and main?"
    tags: ["log", "diff", "blame", "history"]

  - name: "conflict-resolution"
    description: "Detect, understand, and resolve merge conflicts"
    prompt: >
      Resolve merge conflicts systematically without losing work.

      Steps:
      1. Run `git status` to identify conflicted files.
      2. Open each conflicted file and locate the conflict markers (<<<<<<<, =======, >>>>>>>).
      3. Understand both sides: read the incoming changes AND the current changes.
      4. Decide the correct resolution — often a combination of both sides.
      5. Remove ALL conflict markers after resolving.
      6. Run `git add <file>` for each resolved file.
      7. Run the build/tests to verify the resolution is correct.
      8. Complete with `git commit` (Git provides a default merge commit message).

      Never blindly accept "ours" or "theirs" — always understand the changes.
    examples:
      - "There are merge conflicts after pulling from main"
      - "Resolve the conflict in package.json"
      - "I tried to rebase and got conflicts"
    tags: ["merge", "conflict", "rebase"]

  - name: "stash-operations"
    description: "Temporarily shelve changes with git stash"
    prompt: >
      Use git stash to temporarily save work-in-progress without committing.

      Common operations:
      - `git stash` — stash tracked changes
      - `git stash -u` — include untracked files
      - `git stash list` — see all stashes
      - `git stash pop` — apply most recent stash and remove it
      - `git stash apply stash@{N}` — apply a specific stash without removing
      - `git stash drop stash@{N}` — delete a specific stash
      - `git stash show -p stash@{N}` — preview stash contents

      Use stash when you need to switch branches but aren't ready to commit.
      Prefer committing on a WIP branch for anything lasting more than a few minutes.
    examples:
      - "Stash my current changes so I can switch to the hotfix branch"
      - "Show me what's in my stash"
      - "Apply the stash but keep it in the stash list"
    tags: ["stash", "wip", "context-switch"]

  - name: "pr-workflow"
    description: "Create, review, and manage pull requests using the gh CLI"
    prompt: >
      Use the `gh` CLI for pull request workflows.

      Creating a PR:
      1. Push the branch: `git push -u origin <branch>`
      2. Create PR: `gh pr create --title "Short title" --body "## Summary\n- Change 1\n- Change 2"`
      3. Include a test plan in the PR body.

      Reviewing:
      - `gh pr list` — see open PRs
      - `gh pr view <number>` — read PR details
      - `gh pr diff <number>` — see the changes
      - `gh pr checks <number>` — check CI status
      - `gh api repos/{owner}/{repo}/pulls/{number}/comments` — read review comments

      Always push before creating a PR. Keep PRs focused — one feature or fix per PR.
    examples:
      - "Create a PR for this branch targeting main"
      - "Check the status of PR #42"
      - "List all open pull requests"
    tags: ["pr", "github", "review", "collaboration"]
