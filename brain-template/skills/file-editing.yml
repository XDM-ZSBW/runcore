name: "File Editing"
description: "File manipulation, search and replace, code refactoring patterns, and codebase navigation"
categories: ["code", "files", "refactoring"]
skills:
  - name: "read-before-edit"
    description: "Always read a file before modifying it to understand context"
    prompt: >
      Before making any edit, read the target file to understand its structure,
      conventions, and surrounding context.

      Steps:
      1. Use Read to view the file contents.
      2. Identify the exact location of the code to change.
      3. Note the indentation style (tabs vs spaces, width).
      4. Check for patterns: naming conventions, import style, comment style.
      5. Make the edit using the Edit tool with exact string matching.
      6. Verify the edit preserved indentation and didn't break surrounding code.

      Use Edit for targeted changes (preserves most of the file).
      Use Write only for new files or complete rewrites.
    examples:
      - "Update the retry count in src/llm/retry.ts"
      - "Change the function signature of getContextForTurn"
      - "Add an import statement to the top of the file"
    tags: ["read", "edit", "safety"]

  - name: "search-and-replace"
    description: "Find and replace patterns across a codebase"
    prompt: >
      Use Grep and Edit to find and replace patterns across multiple files.

      Steps:
      1. Use Grep to find all occurrences: search with the pattern and output_mode "content"
         to see matches in context.
      2. Review each match to confirm it should be changed (avoid false positives).
      3. For each file, use Read to see the full context, then Edit to make the change.
      4. Use Edit with replace_all=true when renaming a variable within a single file.
      5. After all changes, verify with another Grep to confirm no occurrences remain.

      For renames: also check for string references (in comments, configs, tests)
      that might use the old name.
    examples:
      - "Rename getUserById to findUserById everywhere"
      - "Replace all instances of 'TODO' with 'FIXME' in the src directory"
      - "Change the API base URL across all config files"
    tags: ["grep", "replace", "rename", "refactor"]

  - name: "file-discovery"
    description: "Find files by name patterns and navigate project structure"
    prompt: >
      Use Glob to find files by pattern. Use Grep to find files by content.

      Glob patterns:
      - `**/*.ts` — all TypeScript files recursively
      - `src/**/*.test.ts` — test files under src/
      - `**/package.json` — all package.json files
      - `brain/memory/*.jsonl` — JSONL files in memory dir

      Grep for content:
      - `pattern: "class Brain"` — find class definitions
      - `pattern: "export function"`, glob: "*.ts" — find exports
      - `output_mode: "files_with_matches"` — just file paths (default)
      - `output_mode: "content"` — show matching lines

      Start with Glob for structural questions ("where are the tests?").
      Use Grep for semantic questions ("which file handles auth?").
    examples:
      - "Find all YAML files in the brain directory"
      - "Which files import the Brain class?"
      - "List all test files in the project"
    tags: ["glob", "grep", "navigation", "discovery"]

  - name: "code-extraction"
    description: "Extract code into functions, modules, or separate files"
    prompt: >
      Extract repeated or complex code into reusable units.

      When to extract:
      - The same logic appears in 3+ places (DRY threshold).
      - A function is over 50 lines and has clearly separable concerns.
      - A block of code has a distinct, nameable purpose.

      Steps:
      1. Identify the code to extract and its inputs/outputs.
      2. Create the new function with clear parameter types and return type.
      3. Replace the original code with a call to the new function.
      4. If extracting to a new file, add proper imports/exports.
      5. Verify all call sites still work after extraction.

      Don't extract prematurely — three similar lines is fine. Only extract when
      complexity genuinely warrants it.
    examples:
      - "Extract the validation logic into its own function"
      - "Move the date formatting helpers to a utils file"
      - "This parsing logic is duplicated in three places — consolidate it"
    tags: ["extract", "refactor", "DRY", "functions"]

  - name: "import-management"
    description: "Add, remove, and organize import statements"
    prompt: >
      Manage imports following the project's existing conventions.

      For TypeScript/ESM projects:
      - Use `import type { X }` for type-only imports.
      - Use `.js` extensions in import paths (NodeNext module resolution).
      - Group imports: node builtins → external packages → local modules.
      - Remove unused imports when cleaning up.

      Adding an import:
      1. Check the export style of the target module (named vs default).
      2. Add the import at the appropriate position in the import block.
      3. Use the exact path convention the project already uses.

      Removing:
      1. Grep for all usages of the imported name.
      2. If zero usages remain, remove the import line.
      3. If removing the last named import from a line, remove the entire import statement.
    examples:
      - "Add the missing import for readFile from node:fs/promises"
      - "Clean up unused imports in this file"
      - "Convert this require() to an ESM import"
    tags: ["imports", "modules", "typescript", "cleanup"]

  - name: "json-yaml-editing"
    description: "Safely edit structured data files like JSON, YAML, and JSONL"
    prompt: >
      Edit structured data files carefully to preserve valid syntax.

      JSON:
      - Always read first — JSON is whitespace-sensitive for diffs.
      - Match existing indentation (usually 2 spaces).
      - Ensure trailing commas are correct (no trailing comma in JSON).
      - Validate mentally: matching braces, quoted keys, no comments.

      YAML:
      - Indentation is structural — match exactly (usually 2 spaces).
      - Use quotes around strings that contain special YAML characters (: # [ ] { }).
      - For multi-line strings, use `>` (folded) or `|` (literal).

      JSONL (append-only in this project):
      - Each line is a standalone JSON object.
      - Append new lines at the end — never modify existing lines.
      - Include all required schema fields (check the _schema header line).
    examples:
      - "Add a new field to package.json"
      - "Update the version in tsconfig.json"
      - "Append a new entry to experiences.jsonl"
    tags: ["json", "yaml", "jsonl", "config"]
